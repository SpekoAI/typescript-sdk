name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Node 24 ships with npm 11 which supports the trusted publisher
      # OIDC exchange. Do NOT add setup-node's `registry-url` — it writes
      # an .npmrc with an _authToken placeholder that prevents npm from
      # falling through to OIDC. Let npm default to the public registry.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install --no-save

      - name: Build for publish
        run: npx tsc -p tsconfig.publish.json

      - name: Publish with provenance
        run: npm publish --provenance --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" \
            --title "v${VERSION}" \
            --generate-notes \
            --verify-tag
