name: Notify monorepo of mirror changes

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    # Skip pushes that originated from the monorepo's own outbound mirror
    # workflow (`mirror-sdk.yml`). Those commits always start with the prefix
    # below, carry the already-synced subtree, and dispatching on them would
    # burn a no-op sync-from-mirrors run round-trip.
    if: "!startsWith(github.event.head_commit.message, 'sync: import packages/sdk from monorepo @')"
    steps:
      - name: Trigger monorepo inbound sync
        env:
          MONOREPO_PAT: ${{ secrets.MONOREPO_PAT }}
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${MONOREPO_PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/SpekoAI/platform/dispatches \
            -d '{"event_type":"sdk-sync","client_payload":{"sha":"${{ github.sha }}"}}'
